name: Generate Daily OpenClaw

on:
  schedule:
    # 09:00 UTC daily
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      force_overwrite:
        description: "Force overwrite today's file (delete & regenerate, commit even if identical)"
        type: boolean
        required: false
        default: false

jobs:
  generate-daily-openclaw:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # If manually dispatched with force_overwrite=true, remove today's file first
      - name: Pre-clean today's file on force
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force_overwrite == true }}
        run: |
          set -euxo pipefail
          TODAY_UTC="$(date -u +%F)"
          rm -f "recipes/${TODAY_UTC}.json" || true

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install deps
        run: |
          set -e
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i
          fi

      - name: Generate today's Daily OpenClaw
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DAILY_DROP_HEMISPHERE: ${{ secrets.DAILY_DROP_HEMISPHERE }}
          FORCE_OVERWRITE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_overwrite == true }}
        run: node generate-daily-openclaw.js

      - name: Commit & push
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A recipes/*.json || true
          
          TODAY_UTC="$(date -u +%F)"
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: add/overwrite Daily OpenClaw for ${TODAY_UTC}"
            git push
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_overwrite }}" = "true" ]; then
              git commit --allow-empty -m "chore: forced regeneration (no diff) for ${TODAY_UTC}"
              git push
            else
              echo "No changes to commit."
            fi
          fi

      - name: Upload artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: latest-daily-openclaw
          path: recipes/*.json
          if-no-files-found: ignore
