name: Generate Daily OpenClaw

on:
  schedule:
    # 09:00 UTC daily
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      force_overwrite:
        description: "Force overwrite today's file (delete & regenerate, commit even if identical)"
        type: boolean
        required: false
        default: false

jobs:
  generate-daily-openclaw:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # If manually dispatched with force_overwrite=true, remove today's file first
      - name: Pre-clean today's file on force
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force_overwrite == true }}
        run: |
          set -euxo pipefail
          TODAY_UTC="$(date -u +%F)"
          rm -f "blueprints/${TODAY_UTC}.json" || true

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          # Check if package.json exists
          if [ ! -f package.json ]; then
            echo "Creating package.json with required dependencies..."
            cat > package.json << 'EOF'
{
  "name": "clawkits-daily",
  "version": "1.0.0",
  "description": "Daily OpenClaw generator using DeepSeek API",
  "main": "generate-daily-openclaw.js",
  "dependencies": {
    "openai": "^4.0.0"
  }
}
EOF
          fi
          
          # Install dependencies
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Ensure system prompt exists
        run: |
          # Create system-clawkit-drop.txt if it doesn't exist
          if [ ! -f system-clawkit-drop.txt ]; then
            echo "Creating system-clawkit-drop.txt with default prompt..."
            cat > system-clawkit-drop.txt << 'EOF'
You are ClawKit, an AI assistant that generates daily creative content about claws, kits, and related themes. Create engaging, well-structured, and informative content that's suitable for a daily blueprint. Be creative, accurate, and maintain a consistent tone.
EOF
          fi

      - name: Ensure blueprints directory exists
        run: |
          mkdir -p blueprints
          echo "✅ Blueprints directory ready"

      - name: Generate today's Daily OpenClaw
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DAILY_DROP_HEMISPHERE: ${{ secrets.DAILY_DROP_HEMISPHERE }}
          FORCE_OVERWRITE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_overwrite == true }}
        run: |
          node generate-daily-openclaw.js

      - name: Commit & push blueprints
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add only blueprints folder
          git add blueprints/*.json || true
          
          TODAY_UTC="$(date -u +%F)"
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: add/overwrite Daily OpenClaw blueprint for ${TODAY_UTC}"
            git push
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_overwrite }}" = "true" ]; then
              git commit --allow-empty -m "chore: forced regeneration (no diff) for ${TODAY_UTC}"
              git push
            else
              echo "No changes to commit."
            fi
          fi

      - name: Upload artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: latest-daily-openclaw-blueprint
          path: blueprints/*.json
          if-no-files-found: ignore
