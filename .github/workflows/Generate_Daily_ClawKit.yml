const fs = require('fs');
const path = require('path');
const { OpenAI } = require('openai');

// Configure DeepSeek client only
const apiKey = process.env.DEEPSEEK_API_KEY;

if (!apiKey) {
  console.error("Error: DEEPSEEK_API_KEY environment variable is not set.");
  process.exit(1);
}

const openai = new OpenAI({
  apiKey: apiKey,
  baseURL: 'https://api.deepseek.com'
});

async function generateDailyOpenClaw() {
  const today = new Date().toISOString().split('T')[0];
  const filePath = path.join(__dirname, 'recipes', `${today}.json`);

  // 1. Check if we already have today's blueprint (unless forcing overwrite)
  if (fs.existsSync(filePath) && process.env.FORCE_OVERWRITE !== 'true') {
    console.log(`OpenClaw for ${today} already exists. Skipping.`);
    return;
  }

  // 2. Load the System Prompt
  const systemPrompt = fs.readFileSync(
    path.join(__dirname, 'system-clawkit-drop.txt'), 
    'utf8'
  );

  console.log(`Generating Daily OpenClaw for ${today} using DeepSeek...`);

  try {
    const response = await openai.chat.completions.create({
      model: "deepseek-chat",
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: `Generate the Daily OpenClaw blueprint for ${today}.` }
      ],
      response_format: { type: "json_object" }
    });

    const openClawData = JSON.parse(response.choices[0].message.content);

    // 3. Ensure the recipes directory exists
    const recipesDir = path.join(__dirname, 'recipes');
    if (!fs.existsSync(recipesDir)) {
      fs.mkdirSync(recipesDir, { recursive: true });
    }

    // 4. Write the file
    fs.writeFileSync(filePath, JSON.stringify(openClawData, null, 2));
    console.log(`Successfully saved Daily OpenClaw: ${filePath}`);

  } catch (error) {
    console.error("Error generating OpenClaw:", error);
    process.exit(1);
  }
}

generateDailyOpenClaw();
