- name: Generate today's Lobster Blueprint
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FORCE_OVERWRITE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_overwrite == true }}
        run: node generate-daily-clawkit.js # Updated to match your new filename

      - name: Commit & push
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage changes specifically in the blueprints directory
          git add -A blueprints/*.json || true

          TODAY_UTC="$(date -u +%F)"

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: add/overwrite The Daily Claw for ${TODAY_UTC}"
            git push
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_overwrite }}" = "true" ]; then
              git commit --allow-empty -m "chore: forced claw regeneration for ${TODAY_UTC}"
              git push
            else
              echo "No changes to commit."
            fi
          fi
