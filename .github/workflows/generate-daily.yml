name: Generate Daily OpenClaw

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      force_overwrite:
        description: "Force overwrite today's file"
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then
            echo '{"dependencies": {"openai": "^4.0.0"}}' > package.json
          fi
          npm install
      
      - name: Create required files
        run: |
          mkdir -p blueprints
          
          if [ ! -f system-clawkit-drop.txt ]; then
            echo "You are ClawKit, an AI assistant that generates daily creative content." > system-clawkit-drop.txt
          fi
      
      - name: Generate blueprint
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FORCE_OVERWRITE: ${{ github.event.inputs.force_overwrite }}
        run: node generate-daily-openclaw.js
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blueprints/
          if ! git diff --quiet --staged; then
            git commit -m "Update daily blueprint"
            git push
          else
            echo "No changes to commit"
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blueprints
          path: blueprints/
